name: 🚀 Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装依赖
      - name: 📦 Install dependencies
        run: npm ci

      # 4. 构建
      - name: 🔨 Build project
        run: npm run build

      # 5. 打包构建产物
      - name: 📦 Package artifacts
        run: |
          mkdir -p public
          tar -czf deploy.tar.gz .next package.json package-lock.json public next.config.js

      # 6. 上传到服务器
      - name: 🚀 Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/var/www/ai-profile"
          strip_components: 0

      # 7. 在服务器上部署
      - name: 🔄 Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/ai-profile
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            # 写入环境变量（从 GitHub Secrets 注入）
            echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" > .env.local
            # 安装生产依赖
            npm ci --production
            # 用 PM2 启动/重启应用
            if pm2 list | grep -q "ai-profile"; then
              PORT=3035 pm2 restart ai-profile
            else
              PORT=3035 pm2 start npm --name "ai-profile" -- start
            fi
            pm2 save
            # 重启 Nginx
            nginx -t && systemctl restart nginx
